# -------------------------------------------------------------------
# GitHub Actions workflow for libcdaydiff – ULTRA STABLE & VERBOSE
# -------------------------------------------------------------------
# Build + test static library on Linux (64/32), macOS (Intel/ARM),
# Windows (64/32 via MSYS2). Automatic release on v* tags.
# -------------------------------------------------------------------

name: Build, Test, and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false # Continue other builds if one fails
      matrix:
        include:
          # ---------- Linux 64-bit ----------
          - os: ubuntu-latest
            arch: x86_64
            artifact: libcdaydiff-linux-x86_64
            cflags: ""
            msystem: ""
            extra-setup: ""

          # ---------- Linux 32-bit (multilib) ----------
          - os: ubuntu-latest
            arch: i686
            artifact: libcdaydiff-linux-i686
            cflags: "-m32"
            msystem: ""
            extra-setup: "sudo apt-get update && sudo apt-get install -y gcc-multilib"

          # ---------- macOS Intel (x86_64) ----------
          - os: macos-latest # Intel runner
            arch: x86_64
            artifact: libcdaydiff-macos-x86_64
            cflags: "-arch x86_64"
            msystem: ""
            extra-setup: ""

          # ---------- macOS Apple Silicon (ARM64) ----------
          - os: macos-latest # ARM runner
            arch: arm64
            artifact: libcdaydiff-macos-arm64
            cflags: "-arch arm64"
            msystem: ""
            extra-setup: ""

          # ---------- Windows 64-bit (MINGW64) ----------
          - os: windows-latest
            arch: x86_64
            artifact: libcdaydiff-windows-x86_64
            cflags: ""
            msystem: MINGW64
            extra-setup: ""

          # ---------- Windows 32-bit (MINGW32) ----------
          - os: windows-latest
            arch: i686
            artifact: libcdaydiff-windows-i686
            cflags: ""
            msystem: MINGW32
            extra-setup: ""

    runs-on: ${{ matrix.os }}
    env:
      ARTIFACT_NAME: ${{ matrix.artifact }}

    steps:
      # ----------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # 2. Platform setup
      # ----------------------------------------------------------
      - name: Extra setup (Linux 32-bit multilib)
        if: runner.os == 'Linux' && matrix.arch == 'i686'
        run: |
          set -euxo pipefail
          ${{ matrix.extra-setup }}

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: >-
            base-devel
            mingw-w64-${{ matrix.arch }}-gcc
            mingw-w64-${{ matrix.arch }}-cmake
          update: true
          path-type: strict

      # ----------------------------------------------------------
      # 3. Build (CMake) – verbose output
      # ----------------------------------------------------------
      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -euxo pipefail
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-O2 -g ${{ matrix.cflags }}" \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build targets (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -euxo pipefail
          cmake --build build --target cdaydiff_static test_date --verbose

      - name: Configure CMake (Windows MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          cmake -B build \
            -G "MSYS Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-O2 -g ${{ matrix.cflags }}" \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build targets (Windows MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          cmake --build build --target cdaydiff_static test_date --verbose

      # ----------------------------------------------------------
      # 4. Run unit tests
      # ----------------------------------------------------------
      - name: Run unit tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./build/test_date

      - name: Run unit tests (Windows MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ./build/test_date.exe

      # ----------------------------------------------------------
      # 5. Prepare and upload artifact (BASH shell forced for all OS)
      # ----------------------------------------------------------
      - name: Prepare artifact folder
        shell: bash # Ensures Bash syntax even on Windows
        run: |
          set -euxo pipefail
          mkdir -p artifact
          if [ ! -f build/libcdaydiff.a ]; then
            echo "ERROR: libcdaydiff.a not found!" >&2
            exit 1
          fi
          cp -v build/libcdaydiff.a artifact/
          cp -v src/include/libcdaydiff.h artifact/
          echo "Platform: ${{ matrix.artifact }}" > artifact/PLATFORM.txt
          echo "Artifact folder contents:"
          ls -la artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifact/

  # ===================================================================
  # Release Job (only on version tags)
  # ===================================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display artifact structure
        run: ls -R

      - name: Package each artifact into ZIP
        run: |
          set -euxo pipefail
          for dir in libcdaydiff-*; do
            if [ -d "$dir" ]; then
              echo "Zipping $dir ..."
              (cd "$dir" && zip -r "../${dir}.zip" .)
            fi
          done
          echo "ZIP archives:"
          ls -lh *.zip

      - name: Generate SHA256 checksums
        run: |
          set -euxo pipefail
          rm -f SHA256SUMS
          for zipfile in libcdaydiff-*.zip; do
            [ -f "$zipfile" ] && sha256sum "$zipfile" >> SHA256SUMS
          done
          echo "Checksums:"
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          artifacts: "libcdaydiff-*.zip,SHA256SUMS"
          body: |
            ## libcdaydiff Release ${{ github.ref_name }}

            Pre-built **static library** (`libcdaydiff.a`) + header for:

            - **Linux** (x86_64, i686)
            - **macOS** (x86_64, ARM64)
            - **Windows** (x86_64, i686) via MinGW-w64

            All builds compiled with `-O2 -g` (optimized + debug symbols).

            ### How to use
            1. Download the ZIP for your platform.
            2. Extract `libcdaydiff.a` and `libcdaydiff.h`.
            3. Compile your program:
               ```bash
               gcc -std=c99 -I. myapp.c libcdaydiff.a -o myapp
               ```

            ### Integrity verification

            Run:

            ```bash
            sha256sum -c SHA256SUMS
            ````
