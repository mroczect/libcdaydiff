name: Deploy Docs (libcdaydiff)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get latest RawSSG release
        id: rawssg
        run: |
          REPO="mroczect/rawssg"
          TAG=$(curl -s "https://api.github.com/repos/${REPO}/releases/latest" | jq -r .tag_name)
          echo "Latest RawSSG release: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download RawSSG binary
        run: |
          curl -fsSL "https://github.com/mroczect/rawssg/releases/download/${{ steps.rawssg.outputs.tag }}/rawssg-ubuntu-latest.tar.gz" -o rawssg.tar.gz
          tar -xzf rawssg.tar.gz
          chmod +x rawssg
          sudo mv rawssg /usr/local/bin/

      - name: Build documentation
        working-directory: docs
        run: rawssg compile

      - name: List generated files (debug)
        run: ls -la docs/dist/

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
